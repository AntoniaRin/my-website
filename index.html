<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study & Tools Hub</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f4f4;
  padding: 0;
  margin: 0;
}

header {
  background: #333;
  color: white;
  padding: 30px;
}

section {
  background: white;
  margin: 30px auto;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  color: #333;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  margin: 10px;
  cursor: pointer;
  border: none;
  border-radius: 5px;
  background: #007BFF;
  color: white;
}

input[type=number] {
  padding: 5px;
  width: 60px;
  font-size: 16px;
}

#timerDisplay {
  font-size: 36px;
  margin: 20px 0;
  color: #007BFF;
}

#passwordDisplay {
  font-size: 24px;
  margin-top: 10px;
  word-break: break-all;
}
</style>
</head>
<body>

<header>
  <h1>Study & Tools Hub</h1>
  <p>Focus Timer & Random Password Generator</p>
</header>

<section>
  <h2>Study / Productivity Timer</h2>
  <p>Set minutes:</p>
  <input type="number" id="minutesInput" value="25" min="1">
  <div id="timerDisplay">25:00</div>
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
</section>

<section>
  <h2>Random Password Generator</h2>
  <p>Password length:</p>
  <input type="number" id="passwordLength" value="12" min="4" max="32">
  <div id="passwordDisplay"></div>
  <button onclick="generatePassword()">Generate Password</button>
</section>

<script>
// ===== Timer =====
let timer;
let totalSeconds = 25 * 60;
let isRunning = false;

function updateDisplay() {
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  document.getElementById('timerDisplay').textContent =
    `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}

function startTimer() {
  if (!isRunning) {
    isRunning = true;
    timer = setInterval(() => {
      if (totalSeconds > 0) {
        totalSeconds--;
        updateDisplay();
      } else {
        clearInterval(timer);
        isRunning = false;
        alert("Time's up! ⏰");
      }
    }, 1000);
  }
}

function pauseTimer() {
  clearInterval(timer);
  isRunning = false;
}

function resetTimer() {
  clearInterval(timer);
  isRunning = false;
  totalSeconds = parseInt(document.getElementById('minutesInput').value) * 60;
  updateDisplay();
}

document.getElementById('minutesInput').addEventListener('change', () => {
  totalSeconds = parseInt(document.getElementById('minutesInput').value) * 60;
  updateDisplay();
});

// ===== Password Generator =====
function generatePassword() {
  const length = parseInt(document.getElementById('passwordLength').value);
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}:"<>?[];,./';
  let password = '';
  for (let i=0; i<length; i++) {
    password += chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById('passwordDisplay').textContent = password;
}

// Initialize display
updateDisplay();
</script>

</body>
</html>
